  bug_004_status: "IMPLEMENTED, PENDING LIVE VERIFICATION (2026-07-16) — per specs/plans/issue-38-restic-backup-timer-noop.md, landed: [Settings] NoRestart = true on components/restic-backup/MANIFEST.toml; new components/restic-backup/restic-backup-trigger.service ([[Services]] entry, Stopped = true, ResourceTypeService so untouched by the buggy Container/Pod-only auto-restart loop) whose only job is 'systemctl restart restic-backup.service'; restic-backup.timer.gotmpl's Unit= retargeted to the trigger service instead of the service directly. TOML validated, mise check:known-hosts and mise ign --server-name flutterina both green (no local materia renderer exists to validate the templated .gotmpl output itself). AGENTS.md gotcha extended in place (not duplicated) with the fix summary; BUG-004 doc and registry.yaml status updated to implemented-pending-verification (not yet 'fixed'). NOT YET VERIFIED LIVE: needs a real materia-update run on both flutterina and bow to confirm NoRestart actually suppresses the problematic auto-restart trigger, plus 2+ real unattended OnCalendar timer fires on both hosts (ExecMainStartTimestamp advancing on its own, NextElapseUSecRealtime staying populated) before marking status: fixed and closing issue #38. Next session: push, trigger materia-update manually on both hosts for fast feedback, then check back ~24h/~48h later for the unattended-fire confirmation."
  bug_005_status: "FIXED (2026-07-15) — discovered as a side effect of testing BUG-004's fix attempt (bow's materia-update was independently broken, blocking verification there). Root cause: audiobookshelf.container.gotmpl bind-mounts /var/lib/materia-data/Podcasts on bow, which was never created (unlike sibling AudioBooks/Books/Music) — podcasts are a new content type with no pre-existing files to seed the directory. Podman fails the run outright (exit 125, statfs: no such file or directory) rather than auto-creating rootful bind-mount sources. Fixed by mkdir -p + chown 1000:1000 directly on bow (host state, not a repo change — no commit needed for the fix itself). Confirmed: materia-update now finishes green on bow, audiobookshelf.service active (running). See specs/bugs/BUG-005-audiobookshelf-podcasts-dir-missing-on-bow.md. This was the blocker for BUG-004/issue #38 — bow now has a healthy materia-update again, so issue #38 planning can proceed."
  note: "Epic e01 (restic-backup) is DONE — all 11 stories closed. AGENTS.md/CLAUDE.md updated with the component tree, 2 architecture-decision bullets, 6 gotchas, and 2 restic doc links from this epic's discoveries. Not yet pushed to origin (local main is several commits ahead of origin/main — see git log). Real production verification (sftp connectivity to the Storage Box, first materia update on flutterina) is still outstanding but out of scope for any repo-local story — it happens at actual deploy time. Recommended next: push to origin, then a real materia update on flutterina to confirm the sftp path end-to-end; separately, consider a follow-up story for the flagged CI gate blind spot (restic-backup-image.yml never exercises the wrapper binary)."
  beszel_hub_status: "Implemented (uncommitted) — components/beszel-hub/ created (MANIFEST.toml, beszel-hub.container.gotmpl pinning henrygd/beszel:0.18.7@sha256:a849ad80..., beszel-data.volume). Wired into MANIFEST.toml Hosts.flutterina. AGENTS.md updated (repo layout + gotcha). Plan refinements verified pre-impl: image runs as root (no User=/Group= on volume), no /beszel_socket volume (agent connects via public WebSocket URL), no Secrets in hub manifest, no vault changes (APP_URL uses existing baseDomain). Preflight green (mise clean && mise ign --server-name flutterina). Open: port 8090 exposure + local-site target address resolved at deploy time (tracked in #22). Agent component is #23 (depends on hub running to generate TOKEN/KEY)."
  beszel_hub_healthcheck_status: "Superseded (2026-07-13) — the custom systemd timer approach (beszel-hub-healthcheck.service.gotmpl + .timer.gotmpl, MANIFEST.toml entries) was reverted. User corrected the plan: hub liveness uses Pangolin's native arbitrary Health Checks feature (Alerting section) against the hub's /api/health endpoint, paired with an Alert Rule (email/webhook), instead of a bespoke systemd timer + healthchecks.io ping. Zero IaC — configured entirely in the Pangolin dashboard at deploy time, alongside the local-site resource (same target-address open question, tracked in #22). AGENTS.md gotcha rewritten accordingly. #24 updated. Agent-down alerts remain beszel's native Shoutrrr webhooks (unchanged from prior decision)."
  beszel_agent_status: "DONE (2026-07-13, closed as #23) — agent fully wired, deployed, and verified live on flutterina. Two real bugs found and fixed during rollout: (1) Environment=KEY={{ .beszelKey }} unquoted-space bug (systemd split the ed25519 public key on whitespace, agent got only 'ssh-ed25519' with no key data, 'ssh: no key found' crash loop) — fixed by quoting, same class of bug also found and fixed in restic-backup's BACKUP_PATHS (tracked in #31). (2) Pangolin's default auth (Platform SSO) on public resources intercepted the agent's WebSocket handshake with a 302 redirect to the login page — fixed by disabling auth on the beszel.<domain> resource in the Pangolin dashboard (no repo change). Confirmed working: curl https://beszel.ririi.dev/api/health returns 200, agent log shows 'WebSocket connected host=beszel.ririi.dev'. Both gotchas documented in AGENTS.md (commits d6b4fbd, 7f8af8b)."
  beszel_podman_monitoring_status: "New sub-issue #32 filed on #20 (2026-07-13) — expand beszel monitoring with podman-native container-level metrics (per-container resource usage, restart counts, quadlet/systemd unit health correlation, per-component volume disk usage). CORRECTED (2026-07-13): confirmed on flutterina that beszel currently shows NO podman/container stats at all in the hub UI, despite the read-only podman socket mount already added in #23 — not 'basic container listing' as first assumed. Issue #32 updated accordingly; first thing to investigate is why the existing socket mount isn't producing any stats (beszel-agent:0.18.7 version gap, missing agent-side config, or podman/Docker socket API compatibility). Not yet scoped/planned. Linked as a real GitHub sub-issue of #20 via the addSubIssue GraphQL mutation, same as #22/#23/#24/#29."
