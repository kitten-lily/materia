# .github/workflows/restic-backup-image.yml
name: restic-backup image

on:
  push:
    branches: [main]
    paths:
      - "images/restic-backup/**"
      - ".github/workflows/restic-backup-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/kitten-lily/materia/restic-backup

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (local, no push)
        uses: docker/build-push-action@v6
        with:
          context: images/restic-backup
          load: true
          push: false
          tags: ${{ env.IMAGE }}:ci-check
          build-args: |
            resticVersion=v0.18.0
            opensshVersion=9.9p1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Gate — restic is static and runs
        run: docker run --rm --entrypoint /usr/bin/restic ${{ env.IMAGE }}:ci-check version

      - name: Gate — ssh is static and runs
        run: docker run --rm --entrypoint /usr/bin/ssh ${{ env.IMAGE }}:ci-check -V

      - name: Gate — wrapper binary runs and validates required env
        run: |
          # Missing RESTIC_REPOSITORY should fail fast with a clear message —
          # proves the wrapper's actual logic (not just its dependencies)
          # shipped. Catches the class of bug from issue #19: an image built
          # from a stub/incomplete wrapper still passes the restic/ssh gates
          # above since neither of them touches the wrapper at all.
          set +e
          output=$(docker run --rm ${{ env.IMAGE }}:ci-check 2>&1)
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "wrapper exited 0 with no required env vars set — expected a fatal guard-clause exit"
            echo "$output"
            exit 1
          fi
          echo "$output" | grep -q "RESTIC_REPOSITORY is required" || {
            echo "wrapper did not produce the expected guard-clause message"
            echo "$output"
            exit 1
          }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: images/restic-backup
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ steps.sha.outputs.short }}
          build-args: |
            resticVersion=v0.18.0
            opensshVersion=9.9p1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Emit digest to job summary
        run: |
          echo "### restic-backup image digest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
