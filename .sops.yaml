# SOPS creation rules — encrypt all attribute vaults with age.
# Generate a key pair: `mise exec -- age-keygen -o key.txt`
# Put the public key (age1...) below. Bake key.txt into Ignition at provision time.
# Docs: https://github.com/getsops/sops#age
creation_rules:
  - path_regex: attributes/.*\.yml$
    age: age1lpkjhlgr84pxryer6z72ygp6v67985e35e4tl28042gmyytavv2q6lpudk
