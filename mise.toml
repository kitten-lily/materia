# mise — pinned toolchain for the materia repo.
# Docs: https://mise.jdx.dev   |   `mise tasks` to list, `mise <task>` to run.

[tools]
age                 = "latest"  # age key generation + encryption (SOPS backend)
sops                = "latest"  # SOPS — encryption for attributes vaults (age backend)
fnox                = "latest"  # secret injection for hz:* tasks (reads fnox.toml)
gum                 = "latest"  # TUI prompts for setup tasks
xh                  = "latest"  # HTTP client for Hetzner API calls
jq                  = "latest"
butane              = "latest"  # Flatcar/CoreOS Butane transpiler
hcloud-upload-image = "latest"  # uploads Flatcar image to Hetzner
pass-cli            = "latest"  # Proton Pass CLI for secret management

[tool_alias]
butane = "aqua:coreos/butane"
hcloud-upload-image = "github:apricote/hcloud-upload-image"
pass-cli = "github:protonpass/pass-cli"

[env]
# Materia attributes engine — SOPS with age backend.
# The age private key lives at /etc/materia/key.txt on the target host
# (baked into Ignition at provision time). The public key goes in .sops.yaml.
# Workstation: `mise install` → `age-keygen -o key.txt` → put pubkey in .sops.yaml.
MATERIA_ATTRIBUTES = "sops"
MATERIA_SOPS__BASE_DIR = "attributes"

# --- Hetzner Cloud provisioning (override per deployment in .mise.local.toml) ---
HCLOUD_API         = "https://api.hetzner.cloud/v1"
HCLOUD_SERVER_TYPE = "cx23"           # 2 vCPU / 4 GB RAM
HCLOUD_LOCATION    = "hel1"           # Helsinki
HCLOUD_SERVER_NAME = "materia"
# HCLOUD_SSH_KEY is optional — set in .mise.local.toml to attach a pre-registered Hetzner SSH key

# Flatcar image upload (hz:upload-image); snapshot is then used directly by hz:create
FLATCAR_CHANNEL    = "stable"
FLATCAR_VERSION    = "current"        # pin a specific version for reproducibility
# hz:ensure-image refreshes the snapshot past this age (roughly Flatcar's release cadence)
FLATCAR_SNAPSHOT_MAX_AGE_DAYS = "30"

# ign, clean, setup/*, hz/* → .mise/tasks/ (file tasks, auto-discovered)
